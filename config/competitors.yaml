# Competitor stores for price intelligence.
#
# Fields:
#   domain       – store domain (no https://)
#   name         – human-readable label used in reports
#   market       – market/region code (NL, DE, FR, GB, US, JP, AU, EU, …)
#   currency     – ISO 4217 currency code
#   includes_vat – true if displayed prices include VAT / GST / consumption tax
#   type         – scraper backend: shopify | woocommerce | auto (default: auto)
#                  auto probes Shopify first, then WooCommerce Store API
#
# Scrapers:
#   shopify     → GET https://{domain}/products.json?limit=250&page=N
#   woocommerce → GET https://{domain}/wp-json/wc/store/v1/products?per_page=100&page=N
#
# The scraper skips a store if it returns 403 / 429 / 451 or exhausts retries.

competitors:

  # ── Netherlands ────────────────────────────────────────────────────────────
  - domain: www.motea.com
    name: Motea NL
    market: NL
    currency: EUR
    includes_vat: true
    type: shopify

  - domain: www.thunderbike.nl
    name: Thunderbike NL
    market: NL
    currency: EUR
    includes_vat: true
    type: auto

